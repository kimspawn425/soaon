<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>야근 — 새벽 4시 44분</title>
<style>
  :root{
    --bg:#05070e; --panel:#0d1322; --panel2:#131b30; --line:#22304f;
    --txt:#d8e2ff; --dim:#7c89b8;
    --cyan:#54e0ff; --amber:#ffb454; --red:#ff5468; --green:#5dff9f;
    --violet:#b08cff; --gold:#ffd166; --pink:#ff7bc1;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:#020308; color:var(--txt);
    font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden; user-select:none;
  }
  #stage{position:relative; width:960px; max-width:100vw;}
  #viewport{position:relative; width:100%; aspect-ratio:960/586;}
  /* 캔버스 540 + 하단바 46 = 586 논리 높이. 스케일은 transform으로 */
  #scaler{position:absolute; left:0; top:0; width:960px; height:586px; transform-origin:0 0;}

  #cv{display:block; width:960px; height:540px; background:#04060c; cursor:crosshair;}

  /* ---------- 핫스팟 라벨 ---------- */
  #hlabel{
    position:absolute; pointer-events:none; display:none; z-index:30;
    background:rgba(5,9,20,.88); border:1px solid var(--line); border-radius:6px;
    padding:4px 10px; font-size:14px; color:var(--cyan); white-space:nowrap;
    text-shadow:0 0 8px rgba(84,224,255,.6);
  }
  #hlabel .verb{color:var(--dim); font-size:12px;}

  /* ---------- 자막 ---------- */
  #subs{
    position:absolute; left:50%; bottom:66px; transform:translateX(-50%);
    width:86%; z-index:20; pointer-events:none; text-align:center;
  }
  .subline{
    display:inline-block; background:rgba(4,7,15,.82); border-radius:8px;
    padding:8px 16px; font-size:17px; line-height:1.55; margin-top:6px;
    border:1px solid rgba(60,80,140,.35);
    text-shadow:0 0 10px currentColor;
  }
  .subline .cont{
    margin-left:10px; font-size:13px; color:var(--dim); text-shadow:none;
    animation:blink 1s steps(2,start) infinite;
  }
  @keyframes blink{ 50%{opacity:0;} }
  #cv.reading{ cursor:none; }
  .sp-anjin{color:#cfe6ff;}
  .sp-ghost{color:var(--pink);}
  .sp-claude{color:var(--red);}
  .sp-claude2{color:var(--amber);}
  .sp-radio{color:var(--gold);}
  .sp-sys{color:var(--dim); font-style:italic;}

  /* ---------- 하단 바 ---------- */
  #bottombar{
    width:960px; height:46px; background:var(--panel);
    border-top:1px solid var(--line); display:flex; align-items:center; gap:6px; padding:0 8px;
  }
  #invbar{display:flex; gap:5px; flex:1; overflow:hidden;}
  .islot{
    width:38px; height:38px; background:var(--panel2); border:1px solid var(--line);
    border-radius:6px; cursor:pointer; position:relative; flex:none;
  }
  .islot:hover{border-color:var(--cyan);}
  .islot.sel{border-color:var(--gold); box-shadow:0 0 10px rgba(255,209,102,.5);}
  .islot canvas{width:36px; height:36px; display:block;}
  #bottombar .btn{
    background:var(--panel2); border:1px solid var(--line); color:var(--txt);
    border-radius:6px; padding:7px 12px; font-size:13px; cursor:pointer; flex:none;
    font-family:inherit;
  }
  #bottombar .btn:hover{border-color:var(--cyan); color:var(--cyan);}

  /* ---------- 대화 선택지 ---------- */
  #choices{
    position:absolute; left:50%; bottom:70px; transform:translateX(-50%);
    width:80%; z-index:40; display:none; flex-direction:column; gap:5px;
  }
  .choice{
    background:rgba(8,13,28,.94); border:1px solid var(--line); border-radius:8px;
    padding:8px 14px; font-size:15px; cursor:pointer; color:var(--txt); text-align:left;
    font-family:inherit;
  }
  .choice:hover{border-color:var(--gold); color:var(--gold); transform:translateX(4px);}
  .choice .n{color:var(--dim); margin-right:8px; font-size:12px;}

  /* ---------- 오버레이 공통 ---------- */
  .overlay{
    position:absolute; inset:0; z-index:50; display:none;
    background:rgba(2,4,10,.9); align-items:center; justify-content:center;
  }
  .obox{
    background:var(--panel); border:1px solid var(--line); border-radius:12px;
    width:760px; max-height:520px; display:flex; flex-direction:column;
    box-shadow:0 0 40px rgba(84,224,255,.15);
  }
  .ohead{
    display:flex; justify-content:space-between; align-items:center;
    padding:12px 18px; border-bottom:1px solid var(--line);
    color:var(--cyan); font-size:15px; letter-spacing:1px;
  }
  .ohead button, .obtn{
    background:var(--panel2); border:1px solid var(--line); color:var(--txt);
    border-radius:6px; padding:6px 14px; cursor:pointer; font-size:13px; font-family:inherit;
  }
  .ohead button:hover, .obtn:hover{border-color:var(--cyan); color:var(--cyan);}

  #pdaTabs{display:flex; gap:6px; padding:10px 18px 0;}
  #pdaTabs button{
    background:none; border:1px solid var(--line); border-bottom:none; color:var(--dim);
    border-radius:8px 8px 0 0; padding:7px 18px; cursor:pointer; font-size:13px; font-family:inherit;
  }
  #pdaTabs button.on{color:var(--gold); border-color:var(--gold); background:var(--panel2);}
  #pdaBody{
    margin:0 18px 16px; border:1px solid var(--line); border-radius:0 8px 8px 8px;
    background:var(--panel2); min-height:330px; max-height:380px; overflow-y:auto; padding:14px 18px;
    font-size:14px; line-height:1.8;
  }
  #pdaBody .goal{color:var(--txt);}
  #pdaBody .goal.done{color:var(--dim); text-decoration:line-through;}
  #pdaBody .goal::before{content:'▸ '; color:var(--gold);}
  #pdaBody .goal.done::before{content:'✓ '; color:var(--green);}
  #pdaBody .scanline{color:var(--cyan); border-bottom:1px dashed var(--line); padding:4px 0; font-size:13px;}
  #pdaBody .logline{padding:5px 0; border-bottom:1px solid rgba(34,48,79,.4); font-size:13px; line-height:1.6;}
  #pdaBody .logline.sp-sys{font-style:italic; opacity:.8;}
  #pdaBody .logline b{font-weight:bold;}

  /* 타이틀 */
  #title{flex-direction:column; gap:26px; text-align:center; background:rgba(2,4,10,.97);}
  #title h1{
    font-size:52px; letter-spacing:10px; color:var(--cyan);
    text-shadow:0 0 24px rgba(84,224,255,.8), 0 0 60px rgba(84,224,255,.4);
  }
  #title .tsub{color:var(--dim); font-size:15px; letter-spacing:3px;}
  #title .tco{color:var(--gold); font-size:13px;}
  #title .tbtns{display:flex; flex-direction:column; gap:10px; width:280px;}
  #title .tbtns button{
    background:var(--panel2); border:1px solid var(--line); color:var(--txt);
    border-radius:8px; padding:13px; font-size:16px; cursor:pointer; letter-spacing:4px; font-family:inherit;
  }
  #title .tbtns button:hover{border-color:var(--cyan); color:var(--cyan); box-shadow:0 0 16px rgba(84,224,255,.3);}
  #title .tbtns button:disabled{opacity:.35; cursor:default;}

  .slotrow{
    display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--line);
    font-size:13px;
  }
  .slotrow .sname{flex:1; color:var(--dim);}
  #menu .obox{width:420px;}
  #menu .mbtns{display:flex; flex-direction:column; gap:8px; padding:16px 18px;}

  /* 크레딧 */
  #credits{flex-direction:column; gap:8px; text-align:center; background:rgba(1,2,6,.98); overflow:hidden;}
  #credits .ctitle{font-size:34px; letter-spacing:8px; color:var(--cyan); text-shadow:0 0 20px rgba(84,224,255,.7); margin-bottom:6px;}
  #credits .cend{font-size:15px; color:var(--gold); letter-spacing:3px; margin-bottom:14px;}
  #credits .cline{font-size:13px; color:var(--dim); line-height:1.9;}
  #credits .cline b{color:var(--txt); font-weight:normal;}
  #credits button{margin-top:22px;}
</style>
</head>
<body>
<div id="stage">
  <div id="viewport"><div id="scaler">
    <canvas id="cv" width="960" height="540"></canvas>
    <div id="bottombar">
      <div id="invbar"></div>
      <button class="btn" id="btnPda">휴대폰 [Tab]</button>
      <button class="btn" id="btnMenu">메뉴</button>
    </div>
    <div id="hlabel"></div>
    <div id="subs"></div>
    <div id="choices"></div>

    <div class="overlay" id="pda">
      <div class="obox">
        <div class="ohead"><span>김우진의 휴대폰 <small style="color:var(--dim)">(배터리 44% — 왜 하필 44%지)</small></span><button id="pdaClose">닫기 [Tab]</button></div>
        <div id="pdaTabs">
          <button data-t="goals" class="on">할 일</button>
          <button data-t="scans">스캔 기록</button>
          <button data-t="log">대화 기록</button>
          <button data-t="map">층별 안내</button>
        </div>
        <div id="pdaBody"></div>
      </div>
    </div>

    <div class="overlay" id="menu">
      <div class="obox">
        <div class="ohead"><span>일시정지</span><button id="menuClose">계속하기 [Esc]</button></div>
        <div class="mbtns" id="menuBody"></div>
      </div>
    </div>

    <div class="overlay" id="title">
      <h1>야근</h1>
      <div class="tsub">O V E R T I M E &nbsp;—&nbsp; 새벽 4시 44분</div>
      <div class="tco">헬리오스로지스 코리아 — 빛보다 성실한 물류</div>
      <div class="tbtns">
        <button id="btnNew">출근한다</button>
        <button id="btnCont">이어하기</button>
      </div>
      <div class="tsub" style="font-size:12px">좌클릭: 행동 · 우클릭: 관찰 · Tab: 휴대폰 · Esc: 메뉴</div>
      <div class="tsub" style="font-size:12px; color:var(--red)">⚠ 큰 소리와 급격한 화면 변화(점프 스케어)가 포함되어 있습니다. 광과민성 주의 · 헤드폰 권장 · 심약자 야근 금지</div>
    </div>

    <div class="overlay" id="credits"></div>
  </div></div>
</div>

<script>
'use strict';
/* ================================================================
   0. 유틸 & 네온 드로잉 헬퍼
================================================================ */
const W = 960, H = 540;
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const $ = id => document.getElementById(id);
const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
const lerp = (a,b,t)=>a+(b-a)*t;

// 시드 고정 의사난수 (배경 디테일이 프레임마다 안 바뀌게)
function srand(seed){ let s=seed>>>0 || 1; return ()=>{ s=(s*1664525+1013904223)>>>0; return s/4294967296; }; }

const P = {  // 팔레트
  bg:'#04060c', floor:'#0a0f1e', wall:'#0d1426', wall2:'#111a30', line:'#22304f',
  cyan:'#54e0ff', amber:'#ffb454', red:'#ff5468', green:'#5dff9f',
  violet:'#b08cff', gold:'#ffd166', dim:'#7c89b8', white:'#d8e2ff',
};

function glow(c, blur=12){ ctx.shadowColor=c; ctx.shadowBlur=blur; }
function noGlow(){ ctx.shadowBlur=0; }
function nline(x1,y1,x2,y2,c,w=2,blur=10){
  ctx.save(); glow(c,blur); ctx.strokeStyle=c; ctx.lineWidth=w;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); ctx.restore();
}
function nrect(x,y,w,h,c,lw=2,blur=10){
  ctx.save(); glow(c,blur); ctx.strokeStyle=c; ctx.lineWidth=lw;
  ctx.strokeRect(x,y,w,h); ctx.restore();
}
function frect(x,y,w,h,c){ ctx.fillStyle=c; ctx.fillRect(x,y,w,h); }
function ncirc(x,y,r,c,fill=false,blur=10){
  ctx.save(); glow(c,blur);
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
  if(fill){ ctx.fillStyle=c; ctx.fill(); } else { ctx.strokeStyle=c; ctx.lineWidth=2; ctx.stroke(); }
  ctx.restore();
}
function ntext(txt,x,y,c,size=13,align='center',blur=8){
  ctx.save(); glow(c,blur); ctx.fillStyle=c;
  ctx.font=`${size}px 'Malgun Gothic',sans-serif`; ctx.textAlign=align;
  ctx.fillText(txt,x,y); ctx.restore();
}
function poly(pts,c,fill=false,lw=2,blur=10){
  ctx.save(); glow(c,blur); ctx.beginPath();
  pts.forEach((p,i)=> i?ctx.lineTo(p[0],p[1]):ctx.moveTo(p[0],p[1]));
  ctx.closePath();
  if(fill){ ctx.fillStyle=c; ctx.fill(); } else { ctx.strokeStyle=c; ctx.lineWidth=lw; ctx.stroke(); }
  ctx.restore();
}

// ---- 공용 배경 조각 ----
function roomBase(wallC=P.wall, floorY=390){
  frect(0,0,W,H,P.bg);
  // 벽
  const g = ctx.createLinearGradient(0,0,0,floorY);
  g.addColorStop(0,'#070b16'); g.addColorStop(1,wallC);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,floorY);
  // 바닥 (원근 그리드)
  const fg = ctx.createLinearGradient(0,floorY,0,H);
  fg.addColorStop(0,'#0c1224'); fg.addColorStop(1,'#05080f');
  ctx.fillStyle=fg; ctx.fillRect(0,floorY,W,H-floorY);
  ctx.save(); ctx.strokeStyle='rgba(60,90,160,.18)'; ctx.lineWidth=1;
  for(let i=0;i<=12;i++){ // 세로 원근선
    const x=i*80; const vx = W/2 + (x-W/2)*2.2;
    ctx.beginPath(); ctx.moveTo(x,floorY); ctx.lineTo(vx,H); ctx.stroke();
  }
  for(let i=1;i<5;i++){ const y=floorY+(H-floorY)*Math.pow(i/5,1.6);
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  ctx.restore();
  // 벽-바닥 경계
  nline(0,floorY,W,floorY,'rgba(84,224,255,.35)',2,8);
}
function wallPanels(seed=1, floorY=390){
  const r=srand(seed);
  ctx.save(); ctx.strokeStyle='rgba(50,75,130,.35)'; ctx.lineWidth=1.5;
  for(let x=0;x<W;x+=160){
    ctx.strokeRect(x+8,30,144,floorY-60);
    if(r()<.5){ ctx.strokeRect(x+20,50,120,26); }
  }
  ctx.restore();
}
function ceilingPipes(seed=2){
  const r=srand(seed);
  for(let i=0;i<4;i++){
    const y=8+i*9;
    nline(0,y,W,y,`rgba(124,137,184,${.25+r()*.2})`,3+r()*3,0);
  }
}
function doorShape(x,y,w,h,c,open=false,label=''){
  nrect(x,y,w,h,c,2.5,14);
  if(open){
    frect(x+4,y+4,w-8,h-8,'#02030a');
    nline(x+4,y+4,x+4,y+h-4,'rgba(84,224,255,.3)',1,0);
  }else{
    frect(x+4,y+4,w-8,h-8,'#0a1020');
    nline(x+w/2,y+8,x+w/2,y+h-8,c,2,8);
    ncirc(x+w/2,y+h/2,7,c);
  }
  // 라벨은 drawExitMarkers가 전담 (중복 방지)
}
function consoleBox(x,y,w,h,c,t,seed=3){
  frect(x,y,w,h,'#0a1020'); nrect(x,y,w,h,c,2,10);
  const r=srand(seed);
  ctx.save();
  for(let i=0;i<5;i++){
    const bx=x+8+r()*(w-30), by=y+8+r()*(h-20), bw=6+r()*18;
    const on = Math.sin(t*(1+r()*2)+i*2.2)>0;
    ctx.fillStyle = on? [P.cyan,P.green,P.amber,P.red][Math.floor(r()*4)] : '#1a2440';
    ctx.fillRect(bx,by,bw,4);
  }
  ctx.restore();
}
function crateBox(x,y,s,c,label=''){
  frect(x,y,s,s*0.72,'#0b1122'); nrect(x,y,s,s*0.72,c,2,8);
  nline(x,y+s*0.36,x+s,y+s*0.36,c,1,4);
  if(label) ntext(label,x+s/2,y+s*0.45,c,10);
}
function starsWindow(x,y,w,h,seed,t){
  frect(x,y,w,h,'#01020a'); nrect(x,y,w,h,P.cyan,2.5,14);
  const r=srand(seed); ctx.save(); ctx.beginPath(); ctx.rect(x,y,w,h); ctx.clip();
  for(let i=0;i<40;i++){
    const sx=x+r()*w, sy=y+r()*h, tw=.4+.6*Math.sin(t*(.5+r())+i);
    ctx.fillStyle=`rgba(216,226,255,${.3+.7*Math.abs(tw)})`;
    ctx.fillRect(sx,sy,1.6,1.6);
  }
  ctx.restore();
}

/* ================================================================
   1. 전역 상태
================================================================ */
const G = {
  room: null,
  flags: {},
  inv: [],
  goals: {},     // id -> {text, done}
  scans: [],
  visited: {},
  ending: null,
  log: [],       // 대화 기록 {s:화자, t:텍스트}
  selItem: null, // 선택된 인벤토리 아이템 id
};

function flag(k){ return !!G.flags[k]; }
function setFlag(k,v=true){ G.flags[k]=v; }
function has(id){ return G.inv.includes(id); }

/* ================================================================
   2. 자막 (say)
================================================================ */
const subsEl = $('subs');
let sayTimer = null, sayResolve = null, sayBusy = false;
const SPEAKER_CLS = {'우진':'sp-anjin','부실장':'sp-claude','김병수':'sp-claude2','지선':'sp-ghost','방송':'sp-radio','시스템':'sp-sys'};

function sayNow(text, speaker='우진'){
  return new Promise(res=>{
    if(typeof TESTFAST!=='undefined' && TESTFAST){ res(); return; }
    // 대화 기록 (순수 UI 토스트는 제외)
    if(text!=='[휴대폰에 저장됨]' && text!=='[음소거]' && text!=='[소리 켬]'){
      G.log.push({s:speaker, t:text}); if(G.log.length>400) G.log.shift();
    }
    subsEl.innerHTML='';
    const d=document.createElement('div');
    d.className='subline '+(SPEAKER_CLS[speaker]||'sp-anjin');
    const label = speaker.endsWith('*')? speaker.slice(0,-1) : speaker;
    d.textContent = speaker==='시스템'? text : `${label==='우진'?'':label+': '}${text}`;
    const hint=document.createElement('span'); hint.className='cont'; hint.textContent='▼';
    d.appendChild(hint);
    subsEl.appendChild(d);
    sayBusy = true;
    sayResolve = res;
    cv.classList.add('reading'); cv.style.cursor='none'; hideLabel();  // 대사 중엔 커서 숨김 + 호버 라벨 제거
    // 자동 진행 없음 — 클릭/스페이스/엔터로만 다음 대사로 넘어감
  });
}
function finishSay(){
  if(sayTimer){ clearTimeout(sayTimer); sayTimer=null; }
  subsEl.innerHTML=''; sayBusy=false;
  cv.classList.remove('reading'); cv.style.cursor='crosshair';
  const r=sayResolve; sayResolve=null;
  if(r) r();
}
// 순차 대사 큐. say('텍스트') 또는 sayQueue([[스피커,텍스트],...])
async function sayQueue(lines){
  for(const [sp,tx] of lines){ await sayNow(tx,sp); }
}
function say(text, speaker='우진'){ return sayNow(text, speaker); }

/* ================================================================
   3. 방 이동 / 게임 루프
================================================================ */
const ROOMS = {};
let time0 = performance.now();

function curRoom(){ return ROOMS[G.room]; }

function goto(roomId){
  const first = !G.visited[roomId];
  G.room = roomId; G.visited[roomId]=true;
  hideLabel();
  // 인트로/엔딩 시네마틱 동안엔 하단바 숨김
  const bb=$('bottombar'); if(bb) bb.style.visibility = (roomId==='_intro')?'hidden':'visible';
  const r = ROOMS[roomId];
  if(typeof playAmb==='function' && r && r.zone!==ambZone){ playAmb(r.zone); }
  if(typeof sfx==='function' && !first) sfx('door');
  if(r && r.onEnter) r.onEnter(first);
  if(typeof autoSave==='function') autoSave();
}

function activeHotspots(){
  const r=curRoom(); if(!r) return [];
  return (r.hotspots||[]).filter(h=>!h.visible || h.visible());
}
function activeExits(){
  const r=curRoom(); if(!r) return [];
  return (r.exits||[]).filter(e=>!e.visible || e.visible());
}

function drawFrame(){
  const t=(performance.now()-time0)/1000;
  const r=curRoom();
  ctx.clearRect(0,0,W,H);
  if(r){ r.draw(ctx,t); drawFx(t); drawExitMarkers(t); }
  requestAnimationFrame(drawFrame);
}

// 모든 활성 출구에 방향 화살표 + 라벨을 항상 표시 (길 잃음 방지)
// 라벨엔 반투명 배경판을 깔아 방 그림과 겹쳐도 읽히게 한다.
// 출구에 side:'left'|'right'|'top'을 명시하면 자동 판별을 덮어쓴다.
function drawExitMarkers(t){
  if(dialogActive) return;
  ctx.save();
  ctx.font='12px "Malgun Gothic", sans-serif';
  for(const e of activeExits()){
    const [x,y,w,h]=e.rect;
    const locked = !!(e.locked && e.locked());
    const c = locked ? P.dim : P.cyan;
    const bob = locked ? 0 : Math.sin(t*3.2)*4;
    const a = locked ? 0.55 : (0.75+0.25*Math.sin(t*2.6));
    const label = (e.label||'이동') + (locked?' (잠김)':'');
    const tw = ctx.measureText(label).width;
    const side = e.side || (x<=8 ? 'left' : (x+w>=W-8 ? 'right' : 'top'));
    ctx.globalAlpha=a;
    // 배경판 + 라벨 (lx = 텍스트 왼쪽, by = 베이스라인)
    const put=(anchorX, by, align)=>{
      const lx = align==='left'? anchorX : align==='right'? anchorX-tw : anchorX-tw/2;
      noGlow();
      ctx.fillStyle='rgba(3,6,14,.88)';
      ctx.fillRect(lx-6, by-14, tw+12, 19);
      ctx.strokeStyle='rgba(84,224,255,.3)'; ctx.lineWidth=1;
      ctx.strokeRect(lx-6, by-14, tw+12, 19);
      glow(c, locked?2:8); ctx.fillStyle=c; ctx.textAlign='left';
      ctx.fillText(label, lx, by);
    };
    glow(c, locked?4:11); ctx.strokeStyle=c; ctx.lineWidth=3.5;
    if(side==='left'){
      const midY=y+h/2, px=Math.max(x,0)+w+10-bob;
      ctx.beginPath(); ctx.moveTo(px+15,midY-11); ctx.lineTo(px,midY); ctx.lineTo(px+15,midY+11); ctx.stroke();
      put(px+22, midY-16, 'left');
    } else if(side==='right'){
      const midY=y+h/2, px=Math.min(x+w,W)-12+bob;
      ctx.beginPath(); ctx.moveTo(px-15,midY-11); ctx.lineTo(px,midY); ctx.lineTo(px-15,midY+11); ctx.stroke();
      put(px-22, midY-16, 'right');
    } else {                        // 정면/내부 문
      const cx=x+w/2, cy=Math.max(30, y-16)-bob*0.5;
      ctx.beginPath(); ctx.moveTo(cx-8,cy-8); ctx.lineTo(cx,cy); ctx.lineTo(cx+8,cy-8); ctx.stroke();
      put(cx, Math.max(17, y-28), 'center');
    }
  }
  ctx.restore();
}
/* ---------- 공포 연출 (scare) ---------- */
const FX = [];
function scare(kind, opt={}){
  FX.push({kind, t0:performance.now()/1000, ...opt});
  sfx('sc_'+kind);
}
function drawFx(t){
  // 상시 비네트 (가장자리 어둡게 — 분위기)
  const vg = ctx.createRadialGradient(W/2,H/2,H*0.45, W/2,H/2,H*0.85);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,.55)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);

  const now=performance.now()/1000;
  for(let i=FX.length-1;i>=0;i--){
    const fx=FX[i], e=now-fx.t0;
    if(fx.kind==='flicker'){
      const dur=fx.dur||1.4;
      if(e>dur){ FX.splice(i,1); continue; }
      // 불규칙 점멸: 어두워졌다 번쩍였다
      const s=Math.sin(e*47)+Math.sin(e*31+2)+Math.sin(e*13);
      if(s>1.2){ ctx.fillStyle='rgba(200,220,255,.08)'; ctx.fillRect(0,0,W,H); }
      else if(s<-.8){ ctx.fillStyle=`rgba(0,0,5,${.55+.3*Math.random()})`; ctx.fillRect(0,0,W,H); }
    }
    else if(fx.kind==='shadow'){
      const dur=fx.dur||2.4;
      if(e>dur){ FX.splice(i,1); continue; }
      // 복도 저편을 스쳐 가는 형체
      const p=e/dur;
      const x=(fx.rtl? 1-p : p)*(W+240)-120;
      const y=fx.y||300, s=fx.s||1;
      const a=Math.sin(p*Math.PI)*.5;
      ctx.save(); ctx.filter='blur(6px)';
      ctx.fillStyle=`rgba(2,3,8,${a})`;
      ctx.beginPath(); ctx.ellipse(x,y-70*s,16*s,26*s,0,0,Math.PI*2); ctx.fill(); // 머리
      ctx.beginPath(); ctx.ellipse(x,y,24*s,62*s,0,0,Math.PI*2); ctx.fill();      // 몸
      ctx.restore();
    }
    else if(fx.kind==='broadcast'){
      const dur=fx.dur||1.6;
      if(e>dur){ FX.splice(i,1); continue; }
      // 방송 노이즈: 스캔라인 + 지직거림
      ctx.save();
      for(let n=0;n<26;n++){
        const y=Math.random()*H;
        ctx.fillStyle=`rgba(180,200,255,${Math.random()*.12})`;
        ctx.fillRect(0,y,W,1+Math.random()*2);
      }
      if(Math.random()<.35){
        const sy=Math.random()*H, sh=8+Math.random()*30;
        const img=ctx.getImageData(0,sy,W,sh);
        ctx.putImageData(img,(Math.random()-.5)*24,sy);
      }
      ctx.restore();
    }
    else if(fx.kind==='pulse'){
      const dur=fx.dur||2.0;
      if(e>dur){ FX.splice(i,1); continue; }
      // 붉은 경고 펄스
      const a=Math.abs(Math.sin(e*6))*.16*(1-e/dur);
      ctx.fillStyle=`rgba(255,60,80,${a})`; ctx.fillRect(0,0,W,H);
    }
  }
}

/* ---------- 사운드 (WebAudio 절차 합성) ---------- */
let AC=null, masterGain=null, ambGain=null, ambOsc=[], muted=false, ambZone=null;
let clankTimer=null;

function initAudio(){
  if(AC) return;
  try{
    AC=new (window.AudioContext||window.webkitAudioContext)();
    masterGain=AC.createGain(); masterGain.gain.value=muted?0:1;
    masterGain.connect(AC.destination);
    ambGain=AC.createGain(); ambGain.gain.value=.14; ambGain.connect(masterGain);
    playAmb(ambZone||'act1');
    scheduleClank();
  }catch(e){ AC=null; }
}
function stopAmb(){
  ambOsc.forEach(n=>{ try{n.stop();}catch(e){} });
  ambOsc=[];
}
const ZONE_DRONE = { f7:[58,60], f8:[50,52.5], b2:[40,42], f4:[64,64.6], gap:[36,37.2] };
function playAmb(zone){
  ambZone=zone;
  if(!AC) return;
  stopAmb();
  const [f1,f2]=ZONE_DRONE[zone]||ZONE_DRONE.f7;
  const lp=AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value= zone==='f4'? 400:220;
  lp.connect(ambGain);
  [f1,f2].forEach(f=>{
    const o=AC.createOscillator(); o.type= zone==='gap'?'sawtooth':'triangle';
    o.frequency.value=f;
    const g=AC.createGain(); g.gain.value=.5;
    o.connect(g); g.connect(lp); o.start();
    ambOsc.push(o);
  });
}
function scheduleClank(){
  if(clankTimer) clearTimeout(clankTimer);
  clankTimer=setTimeout(()=>{
    if(AC && !muted && gameStarted) sfx('clank');
    scheduleClank();
  }, 18000+Math.random()*30000);
}
function tone(freq, dur, type='sine', vol=.2, when=0, slide=0){
  if(!AC) return;
  const o=AC.createOscillator(), g=AC.createGain();
  o.type=type; o.frequency.value=freq;
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(20,freq+slide), AC.currentTime+when+dur);
  g.gain.setValueAtTime(0, AC.currentTime+when);
  g.gain.linearRampToValueAtTime(vol, AC.currentTime+when+.015);
  g.gain.exponentialRampToValueAtTime(.0001, AC.currentTime+when+dur);
  o.connect(g); g.connect(masterGain);
  o.start(AC.currentTime+when); o.stop(AC.currentTime+when+dur+.05);
}
function noiseBurst(dur, vol=.2, filterFreq=1200, type='bandpass'){
  if(!AC) return;
  const len=AC.sampleRate*dur;
  const buf=AC.createBuffer(1,len,AC.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*(1-i/len);
  const src=AC.createBufferSource(); src.buffer=buf;
  const f=AC.createBiquadFilter(); f.type=type; f.frequency.value=filterFreq;
  const g=AC.createGain(); g.gain.value=vol;
  src.connect(f); f.connect(g); g.connect(masterGain); src.start();
}
function sfx(kind){
  if(!AC || muted) return;
  switch(kind){
    case 'click':   tone(880,.06,'square',.05); break;
    case 'pickup':  tone(520,.09,'triangle',.15); tone(780,.12,'triangle',.15,.07); break;
    case 'door':    noiseBurst(.5,.12,300,'lowpass'); tone(90,.4,'sine',.1,0,-30); break;
    case 'goal':    tone(660,.1,'sine',.12); tone(990,.16,'sine',.12,.09); break;
    case 'clank':   noiseBurst(.25,.10,700); tone(140,.3,'sine',.08,0,-60); break;
    case 'sc_flicker': noiseBurst(.8,.08,2400,'highpass'); break;
    case 'sc_shadow':  tone(48,1.6,'sine',.16,0,-14); noiseBurst(1.2,.05,150,'lowpass'); break;
    case 'sc_broadcast': noiseBurst(1.2,.14,1600); break;
    case 'sc_pulse':   tone(70,.9,'sawtooth',.1,0,-20); tone(70,.9,'sawtooth',.1,1.0,-20); break;
  }
}
function toggleMute(){
  muted=!muted;
  if(masterGain) masterGain.gain.value=muted?0:1;
  say(muted?'[음소거]':'[소리 켬]','시스템');
}
document.addEventListener('pointerdown', initAudio, {once:false});

const hlabel = $('hlabel');

function canvasPos(ev){
  const rect=cv.getBoundingClientRect();
  return [ (ev.clientX-rect.left)*W/rect.width, (ev.clientY-rect.top)*H/rect.height ];
}
function hitTest(x,y){
  // 겹칠 경우 "가장 작은(구체적인)" 대상 우선 — 큰 배경(창/벽)이 앞의 작은 오브젝트 클릭을 삼키지 않게.
  const inside=r=>x>=r[0]&&x<=r[0]+r[2]&&y>=r[1]&&y<=r[1]+r[3];
  let best=null, bestArea=Infinity;
  for(const h of activeHotspots()){
    if(inside(h.rect)){ const a=h.rect[2]*h.rect[3]; if(a<bestArea){ bestArea=a; best={type:'hot',h}; } }
  }
  if(best) return best;   // 핫스팟이 출구보다 우선
  for(const e of activeExits()){
    if(inside(e.rect)){ const a=e.rect[2]*e.rect[3]; if(a<bestArea){ bestArea=a; best={type:'exit',e}; } }
  }
  return best;
}
function showLabel(html,x,y){
  hlabel.innerHTML=html; hlabel.style.display='block';
  // #scaler 내부라 transform이 이미 적용됨 — 논리 좌표(960×540) 그대로 사용
  const w = hlabel.offsetWidth, h = hlabel.offsetHeight;
  let lx = x + 16, ly = y + 14;
  if(lx + w > 954) lx = x - w - 10;  // 우측 가장자리: 커서 왼쪽으로
  if(ly + h > 534) ly = y - h - 8;   // 하단 가장자리: 커서 위로
  hlabel.style.left = clamp(lx, 4, 954 - w) + 'px';
  hlabel.style.top  = clamp(ly, 4, 534 - h) + 'px';
}
function hideLabel(){ hlabel.style.display='none'; }

const ITEMS = {};

const invbar = $('invbar');
function give(id, quiet=false){

  invbar.innerHTML='';
  for(const id of G.inv){
    const it=ITEMS[id];

    slot.className='islot'+(G.selItem===id?' sel':'');

      if(G.selItem && G.selItem!==id){
        const fn=COMBOS[comboKey(G.selItem,id)];
        const a=G.selItem; deselectItem();

      G.selItem = (G.selItem===id)? null : id;

  return new Promise(res=>{
    choiceResolver = res;
    choicesEl.innerHTML='';

      const b=document.createElement('button');
      b.className='choice';
      b.innerHTML=`<span class="n">${i+1}.</span>${tx}`;
      b.addEventListener('click', ()=>pickChoice(i));
      choicesEl.appendChild(b);
    });

  });

function pickChoice(i){
  if(!choiceResolver) return;
  choicesEl.style.display='none'; choicesEl.innerHTML='';
  const r=choiceResolver; choiceResolver=null; r(i);

async function dialog(startId){
  dialogActive=true; hideLabel();
  let node = DIALOGS[startId];
  while(node){
    if(node.lines){ await sayQueue(node.lines); }
    const text = typeof node.text==='function'? node.text() : node.text;
    if(text) await sayNow(text, node.speaker||'우진');
    if(node.action) await node.action();
    const avail = (node.choices||[]).filter(c=>!c.cond||c.cond());
    if(avail.length){
      const idx = await showChoices(avail.map(c=>typeof c.text==='function'?c.text():c.text));
      const c = avail[idx];
      if(c.action) await c.action();
      node = c.next? DIALOGS[c.next] : null;
    }else{
      node = node.next? DIALOGS[node.next] : null;
    }
  }
  dialogActive=false;
}

    for(const e of G.log){
      const label = e.s.endsWith('*')? e.s.slice(0,-1) : e.s;
      const d=document.createElement('div');
      d.className='logline '+(SPEAKER_CLS[e.s]||'sp-anjin');

        const nm=document.createElement('b'); nm.textContent=label+' ';

      }
      pdaBody.appendChild(d);
    }
    pdaBody.scrollTop = pdaBody.scrollHeight;  // 최신 대사로 스크롤
  }else{ // map
    pdaBody.innerHTML='';
    const mc=document.createElement('canvas'); mc.width=690; mc.height=380;
    mc.style.width='100%';
    pdaBody.appendChild(mc);
    const m=mc.getContext('2d');
    m.fillStyle='#0a0f1e'; m.fillRect(0,0,690,380);
    m.strokeStyle='rgba(84,224,255,.25)'; m.lineWidth=1.5;
    for(const [a,b] of MAP_LINKS){
      if(!G.visited[a]||!G.visited[b]) continue;
      const [ax,ay]=MAP_POS[a],[bx,by]=MAP_POS[b];
      m.beginPath(); m.moveTo(ax,ay); m.lineTo(bx,by); m.stroke();
    }
    for(const id in MAP_POS){
      if(!G.visited[id]||!ROOMS[id]) continue;
      const [x,y]=MAP_POS[id];
      const cur = id===G.room;
      m.fillStyle = cur? 'rgba(255,209,102,.25)':'rgba(19,27,48,.9)';
      m.strokeStyle = cur? '#ffd166':'#22304f';
      m.shadowColor = cur? '#ffd166':'transparent'; m.shadowBlur=cur?10:0;
      const bw=86,bh=30;
      m.fillRect(x-bw/2,y-bh/2,bw,bh); m.strokeRect(x-bw/2,y-bh/2,bw,bh);
      m.shadowBlur=0;
      m.fillStyle=cur?'#ffd166':'#7c89b8'; m.font='11px "Malgun Gothic"'; m.textAlign='center';
      m.fillText(ROOMS[id].name, x, y+4);
    }
    m.fillStyle='#7c89b8'; m.font='11px "Malgun Gothic"'; m.textAlign='left';
    m.fillText('※ 방문한 곳만 표시됩니다. 4½층은 어떤 안내도에도 없어야 정상입니다.', 12, 368);
  }

let TESTFAST=false;
function waitFor(cond, desc, timeout=4000){
  return new Promise((res,rej)=>{
    const t0=performance.now();
    (function poll(){
      if(cond()) return res();
      if(performance.now()-t0>timeout) return rej(new Error('waitFor timeout: '+desc));
      setTimeout(poll, 8);
    })();
  });
}
function findHot(id){
  const h=activeHotspots().find(h=>h.id===id);
  if(!h) throw new Error(`hotspot '${id}' not visible in room '${G.room}'`);
  return h;
}
const TEST = {
  state(){ return JSON.parse(JSON.stringify({room:G.room,inv:G.inv,flags:G.flags})); },
  async settle(){ await waitFor(()=>!sayBusy || !!choiceResolver, 'settle'); },
  async click(id){ const h=findHot(id); await (h.use? h.use() : h.look && h.look()); await this.settle(); },
  async look(id){ const h=findHot(id); if(h.look) await h.look(); await this.settle(); },
  async useItem(itemId,hotId){
    if(!has(itemId)) throw new Error(`item '${itemId}' not in inventory`);
    const h=findHot(hotId);
    const fn=h.useItem && h.useItem[itemId];
    if(fn) await fn(); else failUse(itemId,h);
    await this.settle();
  },
  async combine(a,b){
    const fn=COMBOS[comboKey(a,b)];
    if(!fn) throw new Error(`no combo ${a}+${b}`);
    await fn(); await this.settle();
  },
  async choose(idx){
    await waitFor(()=>!!choiceResolver, 'choice menu');
    if(idx>=choicesEl.children.length) throw new Error(`choice idx ${idx} out of range (${choicesEl.children.length})`);
    pickChoice(idx); await this.settle();
  },
  async exit(to){
    const e=activeExits().find(e=>e.to===to);
    if(!e) throw new Error(`no exit to '${to}' from '${G.room}'`);
    if(e.locked && e.locked()) throw new Error(`exit to '${to}' locked: ${e.lockedMsg||''}`);
    goto(to); await this.settle();
  },
};

let SOLUTION = []; // [{d:'설명', run:async()=>{}, assert:()=>bool}]
async function runSolution(upTo=Infinity){
  TESTFAST=true;
  try{
    // 대화/자막 상태 초기화 (이전 실행이 중단된 경우 대비)
    dialogActive=false; choiceResolver=null; sayBusy=false;
    choicesEl.style.display='none'; choicesEl.innerHTML='';
    resetState(); gameStarted=true;
    $('title').style.display='none';
    goto(START_ROOM);
    await TEST.settle();
    for(let i=0;i<SOLUTION.length && i<upTo;i++){
      const s=SOLUTION[i];
      try{
        await s.run();
        // 대화 트리가 완전히 끝날 때까지 대기
        await waitFor(()=>!dialogActive || !!choiceResolver, 'dialog settle', 6000);
        if(s.assert && !s.assert()) throw new Error('assert failed');
      }catch(e){
        throw new Error(`SOLUTION step ${i} [${s.d}] failed: ${e.message}`);
      }
    }
    return `OK: ${Math.min(SOLUTION.length,upTo)} steps passed (room=${G.room})`;
  }finally{
    TESTFAST=false;
  }
}
window.TEST=TEST; window.runSolution=runSolution;

function sfxScream(kind){

  noiseBurst(.5,.4,2600,'highpass');
}

}
// 4:44 이후의 간헐 배경음: 금속음 대신 멀리서 또각… 또각… / 먼 문 닫힘 (slow-burn)
scheduleClank = function(){
  if(clankTimer) clearTimeout(clankTimer);
  clankTimer=setTimeout(()=>{
    if(AC && !muted && gameStarted){
      if(flag('blackout')){
        const r=Math.random();
        if(r<.45){ tone(880,.05,'square',.045); tone(880,.05,'square',.04,.42); tone(880,.05,'square',.03,.84); }
        else if(r<.8){ noiseBurst(.5,.06,200,'lowpass'); tone(70,.4,'sine',.05,0,-20); }
        else { tone(52,1.8,'sine',.06,0,-6); }
      } else sfx('clank');
    }

  }, 20000+Math.random()*25000);
};
// drawFx 확장: 점프 스케어를 최상단에 그린다
const _baseDrawFx = drawFx;
drawFx = function(t){
  _baseDrawFx(t);
  if(!jumpFx) return;
  const e=performance.now()/1000-jumpFx.t0;
  const dur = jumpFx.kind==='silhouette1f'? .22 : (jumpFx.kind==='bell'? .9 : .8);
  if(e>dur){ jumpFx=null; return; }
  ctx.save();
  ctx.translate((Math.random()-.5)*16,(Math.random()-.5)*16);   // 진동
  const vis = (e%0.13)<0.085;                                    // 플래시 명멸
  if(jumpFx.kind==='bell'){ ctx.restore(); return; }             // 벨은 진동+소리만
  if(vis){
    frect(-20,-20,W+40,H+40,'#000');
    if(jumpFx.kind==='face'){
      // 창백한 얼굴 클로즈업
      ctx.fillStyle='#cfd4d9';
      ctx.beginPath(); ctx.ellipse(W/2,H/2,190,260,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#0a0a0c';
      ctx.beginPath(); ctx.ellipse(W/2-70,H/2-60,34,52,.12,0,Math.PI*2); ctx.fill();   // 왼눈
      ctx.beginPath(); ctx.ellipse(W/2+62,H/2-70,30,60,-.18,0,Math.PI*2); ctx.fill();  // 오른눈(비대칭)
      ctx.beginPath(); ctx.ellipse(W/2-6,H/2+110,44,86,.05,0,Math.PI*2); ctx.fill();   // 벌어진 입
      ctx.strokeStyle='#111418'; ctx.lineWidth=9;                                       // 흘러내린 머리
      for(let i=0;i<14;i++){ ctx.beginPath(); const x=W/2-160+i*24;
        ctx.moveTo(x,H/2-300); ctx.quadraticCurveTo(x+(Math.random()-.5)*40,H/2-40,x+(Math.random()-.5)*60,H/2+240); ctx.stroke(); }
    } else if(jumpFx.kind==='hands'){
      ctx.fillStyle='#c9ced4';
      for(let i=0;i<5;i++){ // 하단에서 올라오는 손
        const x=120+i*180;
        for(let f=0;f<5;f++){ ctx.beginPath(); ctx.ellipse(x+f*16-32,H-40-Math.abs(f-2)*26,9,52,(f-2)*.09,0,Math.PI*2); ctx.fill(); }
        ctx.beginPath(); ctx.ellipse(x,H+10,52,60,0,0,Math.PI*2); ctx.fill();
      }
    } else if(jumpFx.kind==='eyes'){
      for(let i=0;i<9;i++){
        const r=srand(40+i), x=60+r()*840, y=40+r()*420;
        ctx.fillStyle='#e8ecef';
        ctx.beginPath(); ctx.ellipse(x-14,y,12,7,0,0,Math.PI*2); ctx.ellipse(x+14,y,12,7,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(x-14,y,3,0,7); ctx.arc(x+14,y,3,0,7); ctx.fill();
      }
    } else { // silhouette1f — 1프레임 서 있는 형체
      ctx.fillStyle='#05060a'; ctx.fillRect(-20,-20,W+40,H+40);
      ctx.fillStyle='#161a20';
      ctx.beginPath(); ctx.ellipse(W/2,150,44,58,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(W/2,400,74,240,0,0,Math.PI*2); ctx.fill();
    }
  }
  ctx.restore();
};

function cityWindow(x,y,w,h,seed,t){ // 창밖 도시 야경
  frect(x,y,w,h,'#04060e'); nrect(x,y,w,h,P.dim,1.5,6);
  const r=srand(seed); ctx.save(); ctx.beginPath(); ctx.rect(x,y,w,h); ctx.clip();
  for(let i=0;i<7;i++){ const bx=x+r()*w, bw=18+r()*30, bh=30+r()*(h*.7);
    frect(bx,y+h-bh,bw,bh,'#090d18');
    for(let k=0;k<6;k++){ if(r()<.25) frect(bx+3+((k*7)%bw),y+h-bh+4+r()*(bh-8),3,3,'rgba(255,209,102,.5)'); } }
  ctx.restore();
}
function deskRow(x,y,n,c){ // 사무 책상 열
  for(let i=0;i<n;i++){ const dx=x+i*150;
    frect(dx,y,120,10,'#0b1122'); nrect(dx,y,120,10,c,1.2,3);
    nrect(dx+34,y-34,50,32,'rgba(124,137,184,.45)',1.5,3);   // 모니터
    nline(dx+20,y+10,dx+20,y+52,c,2,0); nline(dx+100,y+10,dx+100,y+52,c,2,0);
  }
}
function clock444(x,y){
  ncirc(x,y,14,P.dim,false,5);
  if(!flag('blackout')){
    // 정전 전: 23:58 (시침·분침만 — 조용한 밤)
    const am=(58/60)*Math.PI*2-Math.PI/2;
    const ah=((11+58/60)/12)*Math.PI*2-Math.PI/2;
    nline(x,y,x+Math.cos(ah)*7,y+Math.sin(ah)*7,'#d8e2ff',2,4);
    nline(x,y,x+Math.cos(am)*11,y+Math.sin(am)*11,'#d8e2ff',1.5,4);
    ntext('23:58',x,y+30,P.dim,9);
    return;
  }
  // 정전 후: 4시 44분에 얼어붙음
  const am4=(44/60)*Math.PI*2-Math.PI/2;
  const ah4=((4+44/60)/12)*Math.PI*2-Math.PI/2;
  nline(x,y,x+Math.cos(ah4)*7,y+Math.sin(ah4)*7,P.red,2,5);
  nline(x,y,x+Math.cos(am4)*11,y+Math.sin(am4)*11,P.red,1.5,5);
  ntext('4:44',x,y+30,P.red,9);
}

function showCredits(title, sub){
  const el=$('credits');
  el.innerHTML='';
  const t=document.createElement('div'); t.className='ctitle'; t.textContent='야근'; el.appendChild(t);
  const s=document.createElement('div'); s.className='cend'; s.textContent=`${title} — ${sub}`; el.appendChild(s);
  for(const line of CREDITS_LINES){
    const d=document.createElement('div'); d.className='cline'; d.innerHTML=line? `<b>${line}</b>`:'&nbsp;'; el.appendChild(d);
  }
  const extra=document.createElement('div'); extra.className='cline';
  extra.textContent = flag('charm_got')? '※ 김병수의 부적이 당신을 지켜주었습니다. 아마도.' : '※ 김병수의 부적을 못 받으셨군요. 다음 야근은 조심하세요.';
  el.appendChild(extra);
  const b=document.createElement('button'); b.className='obtn'; b.textContent='타이틀로';
  b.addEventListener('click', ()=>{ el.style.display='none'; toTitle(); });
  el.appendChild(b);
  el.style.display='flex';
}

}

async function runEndingTest(kind){
  const r = await runSolution();
  TESTFAST=true;
  try{
    TEST.click('att_term');
    if(kind==='clockout'){ await TEST.choose(0); }
    else if(kind==='expose'){ await TEST.choose(1); }
    else { await TEST.choose(2); await TEST.choose(0); }
    await waitFor(()=>!dialogActive, 'ending finish', 8000);
    if(G.ending!==kind) throw new Error('ending mismatch: '+G.ending);
    if($('credits').style.display!=='flex') throw new Error('credits not shown');
    $('credits').style.display='none';
    return `ENDING OK: ${kind} (${r})`;
  }finally{ TESTFAST=false; }
}
// 위기 사망 경로 검증: 각 위기에서 오답 → 사망 → 복구 → 정답
async function runDeathTest(){
  TESTFAST=true;
  try{
    resetState(); gameStarted=true; $('title').style.display='none';
    // C1
    goto('office7'); await TEST.settle();
    await TEST.click('mypc');
    await TEST.exit('hall7'); setFlag('stair_open');
    TEST.exit('stair7'); await TEST.choose(1);           // 사망 선택
    await waitFor(()=>!dialogActive && G.room==='stair7' && !flag('c1_done'), 'c1 death restore', 9000);
    await waitFor(()=>!!choiceResolver,'c1 retry',9000);  // 복구 후 재진입 위기
    await TEST.choose(0);
    await waitFor(()=>flag('c1_done'),'c1 pass',9000);
    return 'DEATH/RESTORE OK (c1: die → auto-restore → retry → pass)';
  }finally{ TESTFAST=false; }
}
window.runEndingTest=runEndingTest; window.runDeathTest=runDeathTest;
